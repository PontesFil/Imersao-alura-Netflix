<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Página de detalhes do título selecionado na Netlipe.">
  <title>Netlipe | Detalhes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style/details.css">
</head>

<body>
  <a class="sr-only" href="#detailsContent">Pular para o conteúdo principal</a>

  <div class="page-loader" id="detailsLoader" aria-hidden="true">
    <div class="page-loader-card" role="status" aria-live="polite" aria-atomic="true">
      <span class="page-loader-brand">NETLIPE</span>
      <span class="page-loader-text">Abrindo detalhes...</span>
    </div>
  </div>

  <div class="details-shell">
    <header class="details-topbar">
      <a class="brand" href="./catalog.html" aria-label="Voltar para o catálogo da Netlipe">NETLIPE</a>

      <div class="details-actions">
        <button class="theme-toggle" type="button" id="themeToggle" aria-label="Alternar entre modo escuro e claro" aria-pressed="false">
          <span class="theme-toggle-track" aria-hidden="true">
            <span class="theme-toggle-icon">Dark</span>
            <span class="theme-toggle-thumb"></span>
            <span class="theme-toggle-icon">Light</span>
          </span>
        </button>
        <a class="back-link" href="./catalog.html">Voltar ao catálogo</a>
      </div>
    </header>

    <main class="details-main" id="detailsContent" aria-busy="true">
      <section class="details-hero" id="detailsHero" aria-labelledby="detailsTitle">
        <div class="details-copy">
          <p class="details-kicker" id="detailsRowTitle">Destaque</p>
          <h1 id="detailsTitle">Carregando...</h1>
          <p class="details-meta" id="detailsMeta"></p>
          <p class="details-description" id="detailsDescription"></p>
          <div class="details-tags" id="detailsTags" aria-label="Informações rápidas do título"></div>
          <div class="details-buttons">
            <button class="details-btn details-btn-primary" type="button" id="watchNow">Assistir agora</button>
            <button class="details-btn details-btn-secondary" type="button" id="saveTitle">Salvar</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="./script/details.js"></script>
</body>

</html>
